<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Aboulfathi Ahmat</title>
    <!-- Intégration de FontAwesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Styles globaux */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* Bleu très foncé, presque noir */
            color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Conteneur principal de la carte */
        .portfolio-card {
            background-color: #1e293b;
            width: 100%;
            max-width: 480px; /* Légèrement plus large pour accommoder plus de contenu */
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* En-tête du profil */
        .profile-header {
            margin-bottom: 30px;
        }

        /* Photo de profil avec effet de halo */
        .profile-photo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #1e293b; /* Même couleur que le fond */
            box-shadow: 0 0 0 4px #38bdf8; /* L'anneau bleu autour */
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        h2 {
            margin: 8px 0 0 0;
            font-size: 16px;
            font-weight: 500;
            color: #38bdf8; /* Couleur d'accentuation */
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Ligne de séparation élégante */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #475569, transparent);
            margin: 30px 0;
        }

        /* Section Compétences (Format Liste détaillée) */
        .skills-section {
            text-align: left;
            margin-bottom: 35px;
        }

        .skills-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-align: center;
        }

        .skill-item {
            display: flex;
            align-items: center;
            background-color: #334155;
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .skill-item:hover {
            transform: translateY(-2px);
            background-color: #3f4f66;
        }

        .skill-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            background-color: #1e293b;
            border-radius: 10px;
            color: #38bdf8;
            font-size: 18px;
            margin-right: 15px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .skill-name {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }

        /* Section des liens sociaux */
        .links-title {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn i {
            margin-right: 10px;
            font-size: 20px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* Styles spécifiques pour WhatsApp */
        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366, #128C7E);
        }

        /* Styles spécifiques pour Facebook */
        .btn-facebook {
            background: linear-gradient(135deg, #1877F2, #0d5aeb);
        }
        
        /* Animation d'apparition douce */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .portfolio-card {
            animation: fadeIn 0.8s ease-out forwards;
        }

    </style>
</head>
<body>

    <div class="portfolio-card">
        
        <div class="profile-header">
            <!-- Image d'espace réservé - Remplacez par votre photo -->
            <img src="Photo.jpg" alt="Aboulfathi Ahmat" class="profile-photo">
            <h1>Aboulfathi Ahmat</h1>
            <h2>Ingénieur Informatique</h2>
        </div>

        <div class="divider"></div>

        <!-- Section Compétences avec icônes -->
        <div class="skills-section">
            <div class="skills-title">Domaines d'expertise</div>
            
            <!-- Compétence 1 : Analyste de données -->
            <div class="skill-item">
                <div class="skill-icon">
                    <i class="fa-solid fa-chart-pie"></i>
                </div>
                <div class="skill-name">Analyste de Données</div>
            </div>

            <!-- Compétence 2 : Administrateur système -->
            <div class="skill-item">
                <div class="skill-icon">
                    <i class="fa-solid fa-server"></i>
                </div>
                <div class="skill-name">Administrateur Système</div>
            </div>

            <!-- Compétence 3 : Développeur -->
            <div class="skill-item">
                <div class="skill-icon">
                    <i class="fa-solid fa-code"></i>
                </div>
                <div class="skill-name">Développeur</div>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Section Contact avec grandes icônes -->
        <div class="links-title">Me Contacter</div>
        <div class="links-container">
            <!-- Bouton WhatsApp -->
            <a href="https://wa.me/23563107257" class="btn btn-whatsapp" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-whatsapp"></i>
                WhatsApp
            </a>
            
            <!-- Bouton Facebook -->
            <a href="https://www.facebook.com/ahmataboulfathi.ahmatabdoulaye" class="btn btn-facebook" target="_blank" rel="noopener noreferrer">
                <i class="fa-brands fa-facebook-f"></i>
                Facebook
            </a>
        </div>

    </div>

</body>
</html>
